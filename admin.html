<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TM Admin Dashboard</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');

        :root {
            --tm-blue: #026cdf;
            --tm-bg: #f5f5f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: var(--tm-bg);
            color: #333;
            padding-bottom: 80px;
        }

        header {
            background: #111;
            color: #fff;
            padding: 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 16px;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #000;
            border-left: 4px solid var(--tm-blue);
            padding-left: 10px;
        }

        .form-g {
            margin-bottom: 15px;
        }

        .form-g label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-g input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .seat-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            align-items: flex-end;
        }

        .seat-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-red {
            background: #d32f2f;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: #fff;
            border-top: 1px solid #ddd;
            text-align: center;
        }

        .btn-save {
            background: var(--tm-blue);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            border: none;
            border-radius: 4px;
            width: 100%;
            max-width: 600px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html">← Back</a>
        <div style="font-weight:900;">Admin Panel</div>
        <div style="width:50px;"></div>
    </header>

    <div class="container">
        <div class="card">
            <h2>Event Details</h2>
            <div class="form-g">
                <label>Event Name</label>
                <input type="text" id="eventName" value="BTS WORLD TOUR 'ARIRANG' IN CHICAGO">
            </div>
            <div class="form-g">
                <label>Date String</label>
                <input type="text" id="eventDate" value="FRI • AUG 28, 2026 • 20:00">
            </div>
            <div class="form-g">
                <label>Venue</label>
                <input type="text" id="venue" value="Soldier Field - Chicago, IL">
            </div>
            <div class="form-g">
                <label>Header Image URL</label>
                <input type="text" id="imageUrl"
                    value="https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?auto=format&fit=crop&q=80&w=1000">
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2>Tickets Inventory</h2>
                <button onclick="addSeat()"
                    style="background:#111; color:#fff; border:none; padding:6px 12px; border-radius:4px; font-weight:700;">+
                    Ad</button>
            </div>
            <div id="seatsContainer"></div>
        </div>

        <div class="card">
            <h2>Financial Configuration</h2>
            <div class="form-g"><label>Bill 1 (Ownership) Total $</label><input type="text" id="bill1Total"
                    value="65.00"></div>
            <div class="form-g"><label>Bill 1 ID Prefix</label><input type="text" id="bill1ID" value="OWN-7721"></div>
            <div class="form-g"><label>Bill 2 (Venue Tax) Total $</label><input type="text" id="bill2Total"
                    value="70.00"></div>
            <div class="form-g"><label>Bill 2 ID Prefix</label><input type="text" id="bill2ID" value="V-8821"></div>
            <div class="form-g"><label>Original Owner Name</label><input type="text" id="senderName" value="Tony"></div>
            <div class="form-g"><label>Repurchase Price $</label><input type="text" id="repurchasePrice" value="250.00">
            </div>
        </div>
    </div>

    <div class="fixed-bottom">
        <button class="btn-save" onclick="saveData()">Save Changes</button>
    </div>

    <script>
        function addSeat(sec = '143', row = '6', num = '1') {
            const d = document.createElement('div');
            d.className = 'seat-row';
            d.innerHTML = `
                <div><label style="font-size:10px; color:#666;">Sec</label><input class="i-sec" value="${sec}"></div>
                <div><label style="font-size:10px; color:#666;">Row</label><input class="i-row" value="${row}"></div>
                <div><label style="font-size:10px; color:#666;">Seat</label><input class="i-num" value="${num}"></div>
                <button class="btn-red" onclick="this.parentElement.remove()">✕</button>
            `;
            document.getElementById('seatsContainer').appendChild(d);
        }

        function loadData() {
            const saved = localStorage.getItem('tm_ticket_data_v2');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('eventName').value = data.eventName;
                document.getElementById('eventDate').value = data.eventDate;
                document.getElementById('venue').value = data.venue;
                document.getElementById('imageUrl').value = data.imageUrl;
                document.getElementById('bill1Total').value = data.bill1Total;
                document.getElementById('bill1ID').value = data.bill1ID;
                document.getElementById('bill2Total').value = data.bill2Total;
                document.getElementById('bill2ID').value = data.bill2ID;
                document.getElementById('senderName').value = data.senderName || 'Current Owner';
                document.getElementById('repurchasePrice').value = data.repurchasePrice || '250.00';

                data.seats.forEach(s => addSeat(s.sec, s.row, s.num));
            } else {
                addSeat('143', '6', '1'); addSeat('143', '6', '2');
                addSeat('143', '6', '3'); addSeat('143', '6', '4');
            }
        }

        function saveData() {
            const seats = [];
            document.querySelectorAll('.seat-row').forEach(r => {
                seats.push({ sec: r.querySelector('.i-sec').value, row: r.querySelector('.i-row').value, num: r.querySelector('.i-num').value });
            });
            const data = {
                eventName: document.getElementById('eventName').value,
                eventDate: document.getElementById('eventDate').value,
                venue: document.getElementById('venue').value,
                imageUrl: document.getElementById('imageUrl').value,
                bill1Total: document.getElementById('bill1Total').value,
                bill1ID: document.getElementById('bill1ID').value,
                bill2Total: document.getElementById('bill2Total').value,
                bill2ID: document.getElementById('bill2ID').value,
                senderName: document.getElementById('senderName').value,
                repurchasePrice: document.getElementById('repurchasePrice').value,
                seats
            };
            localStorage.setItem('tm_ticket_data_v2', JSON.stringify(data));
            alert('Saved successfully!');
        }

        window.onload = loadData;
    </script>
</body>

</html>
