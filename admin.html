<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Admin - Ticket Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #1f2632;
        }

        .admin-box {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #026cdf;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            font-weight: 800;
            font-size: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 13px;
            text-transform: uppercase;
            color: #555;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #026cdf;
            outline: none;
            box-shadow: 0 0 0 3px rgba(2, 108, 223, 0.1);
        }

        .section-title {
            grid-column: span 2;
            background: #f8f9fa;
            padding: 12px;
            font-weight: 800;
            margin-top: 15px;
            border-radius: 6px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-save {
            background: #026cdf;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(2, 108, 223, 0.3);
        }

        .btn-add-seat {
            background: #000;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .seat-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: flex-end;
            grid-column: span 2;
        }

        .btn-remove {
            background: #fee2e2;
            color: #b91c1c;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .preview-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #026cdf;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="admin-box">
        <h1>Ticketmaster Admin Panel</h1>
        <div class="grid">
            <div class="section-title">Event Information</div>
            <div class="form-group">
                <label>Event Name</label>
                <input type="text" id="eventName" value="Taylor Swift | The Eras Tour">
            </div>
            <div class="form-group">
                <label>Event Date (Complete String)</label>
                <input type="text" id="eventDate" value="Fri • Jul 15, 2026 • 7:00 PM">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Venue & Location</label>
                <input type="text" id="venue" value="SoFi Stadium • Inglewood, CA">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Event Image URL</label>
                <input type="text" id="imageUrl"
                    value="https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?auto=format&fit=crop&q=80&w=1000">
            </div>

            <div class="section-title">
                <span>Ticket Seats</span>
                <button class="btn-add-seat" onclick="addSeat()">+ Add Seat</button>
            </div>
            <div id="seatsContainer" style="grid-column: span 2;">
                <!-- Seats will be added here -->
            </div>

            <div class="section-title">Ownership Bill Pricing (First Hurdle)</div>
            <div class="form-group">
                <label>Ownership Bill Total ($)</label>
                <input type="text" id="bill1Total" value="65.00">
            </div>
            <div class="form-group">
                <label>Bill 1 ID Prefix</label>
                <input type="text" id="bill1ID" value="OWN-7721">
            </div>

            <div class="section-title">Venue Claim Fee Pricing (Final Hurdle)</div>
            <div class="form-group">
                <label>Venue Claim Total ($)</label>
                <input type="text" id="bill2Total" value="70.00">
            </div>
            <div class="form-group">
                <label>Bill 2 ID Prefix</label>
                <input type="text" id="bill2ID" value="V-8821">
            </div>
        </div>

        <button class="btn-save" onclick="saveAdminData()">Update Ticket Display & Pricing</button>
        <a href="index.html" target="_blank" class="preview-link">Open My Tickets Simulator →</a>
    </div>

    <script>
    let seatCount = 0;

    function addSeat(sec = '102', row = '15', seat = '') {
        seatCount++;
        const div = document.createElement('div');
        div.className = 'seat-item';
        div.id = 'seat_group_' + seatCount;
        div.innerHTML = `
            <div style="flex:1"><label>Sec</label><input type="text" class="s-sec" value="${sec}"></div>
            <div style="flex:1"><label>Row</label><input type="text" class="s-row" value="${row}"></div>
            <div style="flex:1"><label>Seat</label><input type="text" class="s-num" value="${seat || seatCount}"></div>
            <button class="btn-remove" onclick="removeSeat('${div.id}')">✕</button>
        `;
        document.getElementById('seatsContainer').appendChild(div);
    }

    function removeSeat(id) {
        document.getElementById(id).remove();
    }

    function saveAdminData() {
        const seats = [];
        document.querySelectorAll('.seat-item').forEach(item => {
            seats.push({
                sec: item.querySelector('.s-sec').value,
                row: item.querySelector('.s-row').value,
                num: item.querySelector('.s-num').value
            });
        });

        const data = {
            eventName: document.getElementById('eventName').value,
            eventDate: document.getElementById('eventDate').value,
            venue: document.getElementById('venue').value,
            imageUrl: document.getElementById('imageUrl').value,
            seats: seats,
            bill1Total: document.getElementById('bill1Total').value,
            bill1ID: document.getElementById('bill1ID').value,
            bill2Total: document.getElementById('bill2Total').value,
            bill2ID: document.getElementById('bill2ID').value
        };
        localStorage.setItem('tm_ticket_data_v2', JSON.stringify(data));
        alert('Configuration saved! All screens will update.');
    }

    window.onload = () => {
        const saved = localStorage.getItem('tm_ticket_data_v2');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('eventName').value = data.eventName;
            document.getElementById('eventDate').value = data.eventDate;
            document.getElementById('venue').value = data.venue;
            document.getElementById('imageUrl').value = data.imageUrl;
            document.getElementById('bill1Total').value = data.bill1Total;
            document.getElementById('bill1ID').value = data.bill1ID;
            document.getElementById('bill2Total').value = data.bill2Total;
            document.getElementById('bill2ID').value = data.bill2ID;
            
            data.seats.forEach(s => addSeat(s.sec, s.row, s.num));
        } else {
            addSeat('102', '15', '3');
            addSeat('102', '15', '4');
        }
    };
    </script>
</body>

</html>
